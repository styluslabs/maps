    - name: Download curl and zlib sources
      shell: powershell
      run: |
        # Download and extract curl (latest version as of mid 2026)
        curl.exe -L -o curl.zip https://github.com/curl/curl/releases/download/curl-8_20_0/curl-8.20.0.zip
        Expand-Archive curl.zip -DestinationPath .
        Rename-Item "curl-8.20.0" "curl"

        # Download and extract zlib
        curl.exe -L -o zlib.zip https://github.com/madler/zlib/archive/refs/tags/v1.3.1.zip
        Expand-Archive zlib.zip -DestinationPath .
        Rename-Item "zlib-1.3.1" "zlib"
    - name: Build zlib (Static)
      shell: pwsh
      run: |
        cd zlib
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=OFF
        cmake --build build --config Release
    - name: Build libcurl
      shell: pwsh
      run: |
        cd curl
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=ON `
          -DBUILD_STATIC_LIBS=ON `
          -DBUILD_CURL_EXE=ON `
          -DCURL_ZLIB=ON `
          -DZLIB_INCLUDE_DIR="$pwd\..\zlib;$pwd\..\zlib\build" `
          -DZLIB_LIBRARY="$pwd\..\zlib\build\Release\zlibstatic.lib" `
          -DCURL_USE_SCHANNEL=ON `
          -DCURL_WINDOWS_SSPI=ON `
          -DENABLE_IPV6=ON `
          -DCURL_USE_LIBPSL=OFF
        cmake --build build --config Release
    - name: Download make.exe
      run: curl -L -o make.exe https://github.com/styluslabs/maps/releases/download/alpha-1/make.exe
    - name: MSVC command prompt
      uses: ilammy/msvc-dev-cmd@v1
    - name: Build Maps
      shell: cmd
      working-directory: maps
      run: ..\make.exe SHELL=cmd.exe zip
    # CURL_BASE=..\vcpkg\installed\x64-windows
    # SSH session to debug workflow
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      #if: ${{ failure() }}
      if: github.event_name == 'workflow_dispatch' && inputs.tmate
    - name: Upload release ZIP
      uses: actions/upload-artifact@v4
      with:
        name: release-win64-zip
        path: maps/build/Release/*.zip
    # extremely difficult to find .lib for MSVC, esp. static lib, even for common software like curl
    - name: Upload curl lib
      uses: actions/upload-artifact@v4
      with:
        name: curl-static-win64
        path: curl/build/lib/Release
